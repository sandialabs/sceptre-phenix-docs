extends: default

rules:
  document-start: disable
  indentation:
    indent-sequences: consistent
    spaces: 2
    ignore: |
      mkdocs.yml
  line-length:
    max: 200
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
    ignore: |
      .github/workflows/
      mkdocs.yml
  brackets:
    max-spaces-inside: 1
  braces:
    max-spaces-inside: 1
  octal-values:
    forbid-explicit-octal: true
    forbid-implicit-octal: true
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
