# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
# Run manually: prek run --all-files
#:schema https://www.schemastore.org/prek.json

auto_update.cooldown_days = 30
minimum_prek_version = "0.4.3"
default_language_version.python = "3.12"

# All hooks at the same priority level will run *concurrently* (in parallel),
# and hooks with a lower priority will run before hooks with a higher priority.
# See: https://prek.j178.dev/proposals/concurrency
#
# This repository contains documentation (Markdown + MkDocs config) and shell
# helper scripts. We focus on spelling, shell/YAML linting, conventional
# commits, and general hygiene.

# Linting of GitHub Actions workflows for security issues
# https://docs.zizmor.sh/audits/
[[repos]]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "v1.26.1"

[[repos.hooks]]
id = "zizmor"
args = [
    "--no-progress",
    "--fix"
]

# Spell checking
[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"

[[repos.hooks]]
id = "codespell"
args = [
  "--ignore-words-list",
  "ue,ot,ues,fo,nd,ist,te,iif",
  "--skip",
  "*.svg,theme/**,docs/assets/**,docs/stylesheets/**,docs/javascripts/**"
]
priority = 2


# Shell: ShellCheck (checks shell scripts for common issues)
[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.11.0.1"

[[repos.hooks]]
id = "shellcheck"
priority = 2


# YAML: yamllint
[[repos]]
repo = "https://github.com/adrienverge/yamllint.git"
rev = "v1.29.0"

[[repos.hooks]]
id = "yamllint"
args = [
    "--strict",
    "--config-file=.yamllint.yml"
]
priority = 2


# Enforce conventional commit messages
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"

[[repos.hooks]]
id = "conventional-pre-commit"
stages = ["commit-msg"]
args = [
  "feat",
  "fix",
  "docs",
  "style",
  "refactor",
  "test",
  "chore"
]
priority = 1


# General checks built into prek
[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]
types_or = [
  "markdown",
  "yaml",
  "json"
]
priority = 0

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=1024"]
priority = 1

[[repos.hooks]]
id = "check-case-conflict"
priority = 1

[[repos.hooks]]
id = "check-illegal-windows-names"
priority = 1

[[repos.hooks]]
id = "end-of-file-fixer"
types_or = ["markdown"]
priority = 0

[[repos.hooks]]
id = "fix-byte-order-marker"
priority = 0

[[repos.hooks]]
id = "check-yaml"
# mkdocs.yml uses python tags (e.g. !!python/name) that pyyaml rejects;
# yamllint already validates structure.
exclude = '^mkdocs\.yml$'
priority = 1

[[repos.hooks]]
id = "check-json"
priority = 1

[[repos.hooks]]
id = "check-merge-conflict"
priority = 1

[[repos.hooks]]
id = "check-executables-have-shebangs"
priority = 1

[[repos.hooks]]
id = "check-shebang-scripts-are-executable"
priority = 1

[[repos.hooks]]
id = "check-symlinks"
priority = 1

[[repos.hooks]]
id = "check-toml"
priority = 1

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=no"]
priority = 0

[[repos.hooks]]
id = "check-vcs-permalinks"
description = "Ensures that links to vcs websites are permalinks"
priority = 1

[[repos.hooks]]
id = "no-commit-to-branch"
name = "branch name validation"
description = "Prevent committing to 'main', 'master', or any branch that aren't kebab-case (only allows letters, numbers, and hyphens)"
args = [
  "--branch",
  "main",
  "--branch",
  "master",
  "--branch",
  "dev",
  "--pattern",
  '.*[^\w-].*'
]
priority = 1
